<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Settings - FundsFlee</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{"outline":"#777584","outline-variant":"#c8c4d5","primary":"#1f108e","surface-container-lowest":"#ffffff","on-primary":"#ffffff","primary-container":"#3730a3","surface":"#fcf8ff","on-surface-variant":"#464553","surface-container":"#f0ecf6","background":"#fcf8ff","on-surface":"#1b1b22","surface-variant":"#e4e1eb","primary-fixed":"#e2dfff"},borderRadius:{"DEFAULT":"0.25rem","xl":"0.75rem","full":"9999px","3xl":"1.5rem"},spacing:{"container-margin":"20px","stack-md":"16px","safe":"env(safe-area-inset-bottom)"},fontFamily:{"title-lg":["Inter"],"body-md":["Inter"],"body-sm":["Inter"],"label-md":["Inter"]},fontSize:{"title-lg":["20px",{"lineHeight":"28px","fontWeight":"600"}],"body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],"body-sm":["14px",{"lineHeight":"20px","fontWeight":"400"}],"label-md":["12px",{"lineHeight":"16px","fontWeight":"500"}]}}}}</script>
<style>body{min-height:max(884px,100dvh)}</style>
</head>
<body class="bg-background text-on-background font-body-md pb-28">

<header class="bg-white/90 backdrop-blur-md fixed top-0 left-0 w-full flex justify-between items-center px-8 h-16 border-b border-outline-variant/30 shadow-sm z-40 hidden md:flex">
  <span class="text-xl font-bold text-primary">FundsFlee</span>
  <nav class="flex items-center gap-1 text-sm font-medium text-on-surface-variant">
    <a href="#" class="hover:text-primary px-3 py-2 rounded-lg">Home</a>
    <a href="#" class="hover:text-primary px-3 py-2 rounded-lg">Transactions</a>
    <a href="#" class="hover:text-primary px-3 py-2 rounded-lg">Analytics</a>
    <a href="#" class="text-primary font-semibold bg-primary-fixed px-3 py-2 rounded-lg">Settings</a>
  </nav>
  <button class="bg-primary text-on-primary text-sm font-medium px-5 py-2 rounded-full hover:bg-primary-container transition-colors">Save</button>
</header>

<div class="md:hidden sticky top-0 bg-background/95 backdrop-blur z-30 px-container-margin pt-10 pb-3 flex items-center justify-between border-b border-outline-variant/20">
  <div class="flex items-center gap-3">
    <button class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-surface-container"><span class="material-symbols-outlined text-on-surface-variant">arrow_back</span></button>
    <h1 class="font-title-lg text-title-lg text-on-background">Profile</h1>
  </div>
  <button class="text-primary font-semibold">Save</button>
</div>

<main class="md:pt-24 max-w-2xl mx-auto px-container-margin md:px-5 pt-4 flex flex-col gap-4 pb-8">
  <!-- Avatar -->
  <div class="flex flex-col items-center py-4 gap-3">
    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuC04pNMCkWicgLAImqTncrJr8gHFY6NPCRerOjcnGOs4ttPK9hs4JTWieW3YWfDInKW_IP5W5eL5WIWdNozyIBJ2Xh5g--V2U0aJ7x5e5lQh369CYAys7DPVkp_h7vMOn8i8V7RtiRbeaPzHdinRQdLc13J1-QlMxC3gP4MUQCO1dpPc7KOoBBOpjVwZ5jz5YV_5hF9d1wTvbewAsSHAbfdhbbczzYYf1hTqxLwk-FYU98vG0lRgU-gJvjaLrNiT9kZoE1TId3Hfd0" alt="User" class="w-20 h-20 rounded-2xl object-cover border-2 border-outline-variant"/>
    <p class="font-label-md text-outline">Photo from your Google account</p>
  </div>

  <!-- Form -->
  <div class="bg-surface-container-lowest rounded-3xl border border-surface-variant overflow-hidden">
    <div class="p-stack-md border-b border-surface-variant">
      <label class="font-label-md text-outline block mb-1">Display name</label>
      <input type="text" value="Jebin Einstein" class="w-full bg-transparent font-body-md text-on-surface focus:outline-none"/>
    </div>
    <div class="p-stack-md">
      <label class="font-label-md text-outline block mb-1">Email</label>
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-outline text-[16px]">lock</span>
        <span class="font-body-md text-on-surface-variant">jebineinstein@gmail.com</span>
      </div>
    </div>
  </div>

  <!-- Location -->
  <p class="font-label-md text-outline uppercase tracking-wider px-1">Your location</p>
  <div class="bg-surface-container-lowest rounded-3xl border border-surface-variant overflow-hidden">
    <div class="p-stack-md border-b border-surface-variant">
      <label class="font-label-md text-outline block mb-1">City / Region</label>
      <input type="text" value="Chennai, Tamil Nadu" class="w-full bg-transparent font-body-md text-on-surface focus:outline-none"/>
    </div>
    <button class="w-full flex items-center gap-3 px-stack-md py-3.5 hover:bg-surface-container transition-colors">
      <span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings:'FILL' 1">my_location</span>
      <div class="text-left">
        <p class="font-body-sm text-primary font-medium">Auto-detect my location</p>
        <p class="font-label-md text-outline">Updates city for AI suggestions</p>
      </div>
    </button>
  </div>

  <!-- Lifestyle tags -->
  <p class="font-label-md text-outline uppercase tracking-wider px-1">Lifestyle tags</p>
  <p class="font-body-sm text-on-surface-variant px-1 -mt-2">These help the AI give you relevant tips</p>
  <div class="grid grid-cols-2 gap-2">
    <button class="bg-primary text-on-primary font-body-sm py-3 px-4 rounded-2xl flex items-center gap-2 justify-center"><span>🌱</span> Vegetarian</button>
    <button class="bg-primary text-on-primary font-body-sm py-3 px-4 rounded-2xl flex items-center gap-2 justify-center"><span>💰</span> Budget-conscious</button>
    <button class="border border-outline-variant text-on-surface font-body-sm py-3 px-4 rounded-2xl flex items-center gap-2 justify-center hover:bg-surface-container"><span>🎓</span> Student</button>
    <button class="border border-outline-variant text-on-surface font-body-sm py-3 px-4 rounded-2xl flex items-center gap-2 justify-center hover:bg-surface-container"><span>✈️</span> Frequent traveller</button>
    <button class="border border-outline-variant text-on-surface font-body-sm py-3 px-4 rounded-2xl flex items-center gap-2 justify-center hover:bg-surface-container"><span>👨‍👩‍👧</span> Family</button>
    <button class="bg-primary text-on-primary font-body-sm py-3 px-4 rounded-2xl flex items-center gap-2 justify-center"><span>🏃</span> Health-conscious</button>
    <button class="border border-outline-variant text-on-surface font-body-sm py-3 px-4 rounded-2xl flex items-center gap-2 justify-center hover:bg-surface-container"><span>👴</span> Senior</button>
    <button class="border border-outline-variant text-on-surface font-body-sm py-3 px-4 rounded-2xl flex items-center gap-2 justify-center hover:bg-surface-container"><span>🌙</span> Night owl</button>
  </div>

  <!-- Income -->
  <p class="font-label-md text-outline uppercase tracking-wider px-1">Income (optional)</p>
  <div class="bg-surface-container-lowest rounded-3xl border border-surface-variant p-stack-md">
    <label class="font-label-md text-outline block mb-1">Monthly income</label>
    <div class="flex items-center gap-2">
      <span class="font-body-md text-on-surface-variant">₹</span>
      <input type="text" placeholder="Helps estimate savings rate" class="flex-1 bg-transparent font-body-md text-on-surface focus:outline-none placeholder-outline"/>
    </div>
    <p class="font-label-md text-outline mt-2">Stored only on your device</p>
  </div>
</main>

<div class="fixed bottom-0 left-0 w-full bg-background/95 backdrop-blur border-t border-outline-variant/20 px-container-margin py-4 z-40 md:hidden">
  <button class="w-full bg-primary text-on-primary font-title-lg py-4 rounded-2xl shadow-[0_8px_20px_rgba(31,16,142,0.2)]">Save Profile</button>
</div>
</body></html>
