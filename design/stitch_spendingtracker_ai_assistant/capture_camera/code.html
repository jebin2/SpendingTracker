<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Capture — Camera - FundsFlee</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{"outline":"#777584","outline-variant":"#c8c4d5","primary":"#1f108e","surface-container-lowest":"#ffffff","on-primary":"#ffffff","primary-container":"#3730a3","surface":"#fcf8ff","on-surface-variant":"#464553","surface-container":"#f0ecf6","background":"#fcf8ff","on-surface":"#1b1b22","surface-variant":"#e4e1eb","primary-fixed":"#e2dfff"},borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px","3xl":"1.5rem"},spacing:{"container-margin":"20px","stack-md":"16px","safe":"env(safe-area-inset-bottom)"},fontFamily:{"title-lg":["Inter"],"body-sm":["Inter"],"label-md":["Inter"]},fontSize:{"title-lg":["20px",{"lineHeight":"28px","fontWeight":"600"}],"body-sm":["14px",{"lineHeight":"20px","fontWeight":"400"}],"label-md":["12px",{"lineHeight":"16px","fontWeight":"500"}]}}}}</script>
<style>body{min-height:max(884px,100dvh)}</style>
</head>
<body class="bg-background text-on-background font-body-md">

<!-- Web Header -->
<header class="bg-white/90 backdrop-blur-md fixed top-0 left-0 w-full flex justify-between items-center px-8 h-16 border-b border-outline-variant/30 shadow-sm z-40 hidden md:flex">
  <span class="text-xl font-bold text-primary">FundsFlee</span>
  <nav class="flex items-center gap-1 text-sm font-medium text-on-surface-variant">
    <a href="#" class="hover:text-primary px-3 py-2 rounded-lg">Home</a>
    <a href="#" class="hover:text-primary px-3 py-2 rounded-lg">Transactions</a>
    <a href="#" class="text-primary font-semibold bg-primary-fixed px-3 py-2 rounded-lg">Capture</a>
    <a href="#" class="hover:text-primary px-3 py-2 rounded-lg">Analytics</a>
    <a href="#" class="hover:text-primary px-3 py-2 rounded-lg">Settings</a>
  </nav>
  <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuC04pNMCkWicgLAImqTncrJr8gHFY6NPCRerOjcnGOs4ttPK9hs4JTWieW3YWfDInKW_IP5W5eL5WIWdNozyIBJ2Xh5g--V2U0aJ7x5e5lQh369CYAys7DPVkp_h7vMOn8i8V7RtiRbeaPzHdinRQdLc13J1-QlMxC3gP4MUQCO1dpPc7KOoBBOpjVwZ5jz5YV_5hF9d1wTvbewAsSHAbfdhbbczzYYf1hTqxLwk-FYU98vG0lRgU-gJvjaLrNiT9kZoE1TId3Hfd0" alt="User" class="w-8 h-8 rounded-full object-cover border border-outline-variant"/>
</header>

<!-- Full-screen camera UI (mobile) -->
<div class="md:hidden flex flex-col h-screen bg-black relative overflow-hidden">

  <!-- Top bar overlay -->
  <div class="absolute top-0 left-0 right-0 z-20 px-4 pt-12 pb-4 flex items-center justify-between bg-gradient-to-b from-black/60 to-transparent">
    <button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/40">
      <span class="material-symbols-outlined text-white">arrow_back</span>
    </button>
    <div class="flex gap-2 bg-black/40 rounded-full px-3 py-1">
      <button class="w-8 h-8 flex items-center justify-center rounded-full text-white">
        <span class="material-symbols-outlined text-[20px]">photo_camera</span>
      </button>
      <span class="text-white font-medium text-sm py-1.5 px-2 bg-white/20 rounded-full">Camera</span>
      <button class="text-white/60 font-medium text-sm py-1.5 px-2 rounded-full hover:text-white">Paste</button>
    </div>
    <button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/40">
      <span class="material-symbols-outlined text-white">flash_off</span>
    </button>
  </div>

  <!-- Camera viewfinder (simulated) -->
  <div class="flex-1 relative flex items-center justify-center" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
    <!-- Simulated blurred receipt scene -->
    <div class="absolute inset-0 opacity-30" style="background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px);"></div>

    <!-- Guide frame -->
    <div class="relative w-72 h-96">
      <!-- Corner markers -->
      <div class="absolute top-0 left-0 w-8 h-8 border-t-3 border-l-3 border-white rounded-tl-lg" style="border-width:3px 0 0 3px;border-color:white;border-radius:8px 0 0 0"></div>
      <div class="absolute top-0 right-0 w-8 h-8" style="border-width:3px 3px 0 0;border-style:solid;border-color:white;border-radius:0 8px 0 0"></div>
      <div class="absolute bottom-0 left-0 w-8 h-8" style="border-width:0 0 3px 3px;border-style:solid;border-color:white;border-radius:0 0 0 8px"></div>
      <div class="absolute bottom-0 right-0 w-8 h-8" style="border-width:0 3px 3px 0;border-style:solid;border-color:white;border-radius:0 0 8px 0"></div>
      <!-- Center hint -->
      <div class="absolute inset-0 flex items-center justify-center">
        <p class="text-white/70 text-sm font-medium text-center px-4">Align receipt within frame</p>
      </div>
      <!-- Scanning line animation hint -->
      <div class="absolute left-2 right-2" style="top:40%;height:2px;background:linear-gradient(90deg,transparent,rgba(31,16,142,0.8),transparent);border-radius:1px"></div>
    </div>
  </div>

  <!-- Bottom controls -->
  <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent px-6 pb-10 pt-6">
    <p class="text-white/70 text-xs text-center mb-6">Hold steady — ensure amount &amp; merchant name are visible</p>
    <div class="flex items-center justify-between">
      <!-- Gallery -->
      <button class="w-14 h-14 rounded-2xl bg-white/20 border border-white/30 flex items-center justify-center overflow-hidden">
        <span class="material-symbols-outlined text-white text-2xl">photo_library</span>
      </button>
      <!-- Capture button -->
      <button class="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center bg-white/10 hover:bg-white/20 transition-colors">
        <div class="w-14 h-14 rounded-full bg-white"></div>
      </button>
      <!-- Flip camera -->
      <button class="w-14 h-14 rounded-2xl bg-white/20 border border-white/30 flex items-center justify-center">
        <span class="material-symbols-outlined text-white text-2xl">flip_camera_ios</span>
      </button>
    </div>
  </div>
</div>

<!-- Web fallback (md+) -->
<div class="hidden md:flex md:pt-24 max-w-2xl mx-auto px-8 flex-col gap-6 pb-12 items-center text-center">
  <div class="w-32 h-32 bg-surface-container rounded-3xl flex items-center justify-center">
    <span class="material-symbols-outlined text-6xl text-on-surface-variant">photo_camera</span>
  </div>
  <div>
    <h2 class="font-headline-md text-on-background mb-2" style="font-size:24px;font-weight:600">Capture a Receipt</h2>
    <p class="text-on-surface-variant text-sm max-w-sm">Camera capture works on mobile. On desktop, use the <strong>Paste Text</strong> tab or upload a photo from your files.</p>
  </div>
  <div class="flex gap-3">
    <button class="bg-primary text-on-primary px-6 py-3 rounded-2xl font-medium flex items-center gap-2 hover:bg-primary-container transition-colors">
      <span class="material-symbols-outlined text-[18px]">upload_file</span> Upload receipt photo
    </button>
    <button class="border border-outline-variant text-on-surface-variant px-6 py-3 rounded-2xl font-medium hover:bg-surface-container transition-colors">
      Paste text instead
    </button>
  </div>
</div>
</body></html>
