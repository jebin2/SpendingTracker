<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f108e" />
  <title>FundsFlee — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fcf8ff;
      color: #1c1b1f;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 28px;
      background: #ece6f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 { font-size: 22px; font-weight: 700; }
    p { font-size: 15px; color: #49454f; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 14px 32px;
      border-radius: 28px;
      border: none;
      background: #1f108e;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📵</div>
    <h1>You&rsquo;re offline</h1>
    <p>No internet connection. Open the app while online at least once to enable full offline access.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
